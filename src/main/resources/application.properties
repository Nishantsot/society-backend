# App
spring.application.name=society-portal
server.port=${PORT:8080}
# PostgreSQL (Neon DB - still OK locally if internet works)
# ================== PostgreSQL (Neon) ==================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Important for Neon (cold starts)
spring.datasource.hikari.connection-timeout=60000 
spring.datasource.hikari.validation-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=120000  
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

app.jwt.secret=ReplaceWithAStrongSecretKeyThatIsLongAndSecure2026
app.jwt.expirationMs=86400000
# ================== Mail (Gmail) - FIXED ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=adgipsportal@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Corrected & Higher Timeouts for Render
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=90000
spring.mail.properties.mail.smtp.writetimeout=90000

# Important: Remove conflicting socket factory when using STARTTLS
# spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory   ← REMOVED

spring.mail.properties.mail.debug=true

# Extra helpful settings
spring.mail.properties.mail.smtp.socketFactory.fallback=false
management.health.mail.enabled=false

# ================== General Settings ==================
server.tomcat.connection-timeout=2m
spring.main.lazy-initialization=true