# ================== APP ==================
spring.application.name=society-portal
server.port=${PORT:8080}

# ================== DATABASE (NEON) ==================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hikari (Neon optimization)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================== JWT ==================
app.jwt.secret=ReplaceWithAStrongSecretKeyThatIsLongAndSecure2026
app.jwt.expirationMs=86400000

# ================== BREVO EMAIL (NEW) ==================
brevo.api.key=${BREVO_API_KEY}

# ================== SERVER ==================
server.tomcat.connection-timeout=2m
spring.main.lazy-initialization=true