# App
spring.application.name=society-portal
server.port=${PORT:8080}

# MySQL (Aiven Cloud DB)
spring.datasource.url=jdbc:mysql://mysql-2430579b-nishantkumar8604-13c9.a.aivencloud.com:23180/defaultdb?sslMode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASS}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Hikari (Connection Pool)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT
app.jwt.secret=ReplaceWithAStrongSecretKeyThatIsLong
app.jwt.expirationMs=86400000

# Mail (Gmail App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
